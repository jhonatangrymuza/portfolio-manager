version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: portfolio-manager-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=portfolio-manager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio-manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  portfolio-manager-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-manager-app
    ports:
      - "80:80"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/portfolio-manager
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SERVER_PORT=80
      - MEMBER_API_BASE_URL=http://localhost:80
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
